
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>暖心动感小纸条</title>
<style>
  :root{--bg1:#0f172a;--accent:#ff7bac}
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans SC",Arial;background:linear-gradient(160deg,#071020 0%,#0b2a3a 100%);color:#fff;overflow:hidden}
  .scene{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  .note{position:absolute;min-width:150px;padding:12px 14px;border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));backdrop-filter:blur(4px);box-shadow:0 8px 24px rgba(0,0,0,0.45);color:#fff;font-size:16px;line-height:1.3;transform-origin:center;cursor:pointer;user-select:none}
  .note:hover{transform:translateY(-6px) scale(1.03)}
  @keyframes bob {0%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-18px) rotate(4deg)}100%{transform:translateY(0) rotate(-4deg)}}
  .note.bob{animation: bob 3s ease-in-out infinite}
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(2,6,23,0.6),rgba(2,6,23,0.75));z-index:9999}
  .play-btn{background:linear-gradient(90deg,var(--accent),#ffb86b);padding:18px 28px;border-radius:14px;font-weight:700;border:none;color:#031028;font-size:18px;box-shadow:0 12px 40px rgba(255,123,172,0.18)}
  .controls{position:fixed;left:12px;top:12px;display:flex;gap:8px;z-index:1000}
  .tiny{background:rgba(255,255,255,0.06);padding:8px 10px;border-radius:10px;font-size:13px}
  footer{position:fixed;left:12px;bottom:10px;color:#b8d2e6;font-size:13px}
</style>
</head>
<body>
<div class="scene" id="scene"></div>

<div class="overlay" id="overlay" aria-hidden="false">
  <button id="startBtn" class="play-btn">点我播放暖心音乐并解锁动画</button>
</div>

<div class="controls" style="z-index:1001">
  <div class="tiny" id="shareHint">长按地址栏即可分享</div>
</div>
<footer>愿你被温柔以待</footer>

<!-- 示例音乐（可替换为你自己的 MP3 链接，建议 CORS 允许） -->
<audio id="bg" loop playsinline crossorigin="anonymous">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6b9b7d3a7b.mp3?filename=calm-piano-110219.mp3" type="audio/mpeg">
  你的浏览器不支持音频。
</audio>

<script>
const msgs = [
  "今天也要好好照顾自己。",
  "你做得很好，别忘了微笑。",
  "吃饭了吗？记得补充能量。",
  "深呼吸，给自己一点时间。",
  "每一步都在靠近目标。",
  "允许运气慢慢找到你。",
  "你值得被温柔以待。",
  "有我在这儿，愿意倾听。"
];

const scene = document.getElementById('scene');
function rand(min,max){return Math.random()*(max-min)+min}
function makeNote(text){
  const d=document.createElement('div');
  d.className='note bob';
  d.textContent=text;
  const w=rand(140,220); d.style.width=w+'px';
  d.style.top=rand(4,86)+'%'; d.style.left=rand(4,86)+'%';
  d.style.animationDuration=(rand(2.2,4)).toFixed(2)+'s';
  d.style.rotate = rand(-8,8).toFixed(2)+'deg';
  d.addEventListener('click', ()=>{ d.animate([{transform:'scale(1)'},{transform:'scale(1.06)'},{transform:'scale(1)'}],{duration:320}); });
  d.addEventListener('dblclick', ()=> d.remove());
  return d;
}
function populate(n=16){ scene.innerHTML=''; for(let i=0;i<n;i++){ scene.appendChild(makeNote(msgs[Math.floor(rand(0,msgs.length))])); } }

// autoplay requires user gesture on mobile; overlay collects a tap to unlock audio
const overlay = document.getElementById('overlay'), startBtn=document.getElementById('startBtn'), audio=document.getElementById('bg');
startBtn.addEventListener('click', async ()=>{
  try{
    // attempt to play (unlocks on mobile)
    audio.volume=0.0;
    await audio.play();
    // fade volume to 0.85
    let v=0.0; const target=0.85;
    const fade=setInterval(()=>{ v+=0.05; audio.volume=Math.min(v,target); if(audio.volume>=target) clearInterval(fade); },90);
  }catch(e){ /* play blocked */ }
  overlay.style.display='none';
  populate(18);
});

// in case user taps anywhere else to start
document.body.addEventListener('touchstart', function once(){ if(overlay.style.display!=='none'){ startBtn.click(); } document.body.removeEventListener('touchstart', once); }, {passive:true});

// try to preload (no sound until gesture)
audio.load();
</script>
</body>
</html>
