<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小项目合集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        h1 {
            color: #fff;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(100, 100, 255, 0.4);
            letter-spacing: 3px;
        }
        .subtitle {
            color: #8888bb;
            text-align: center;
            margin-bottom: 40px;
            font-size: 1rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px 30px;
            margin-bottom: 16px;
            transition: all 0.2s;
            display: block;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }
        .card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateX(5px);
        }
        .card-title {
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .card-desc {
            color: #9999bb;
            font-size: 0.9rem;
            margin-top: 6px;
        }
        .card-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 10px;
            margin-top: 8px;
        }
        .footer {
            text-align: center;
            color: #555;
            font-size: 0.8rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 项目合集</h1>
        <p class="subtitle">darken-07 的小作品们</p>

        <a class="card" href="3d-shooter-game/">
            <div class="card-title">🔫 3D 枪战游戏</div>
            <div class="card-desc">基于 Three.js 的第一人称射击游戏，消灭敌人，生存到最后！</div>
            <span class="card-tag">Three.js</span>
            <span class="card-tag">3D</span>
        </a>

        <a class="card" href="snake.html">
            <div class="card-title">🐍 贪吃蛇</div>
            <div class="card-desc">经典贪吃蛇小游戏，键盘方向键控制</div>
            <span class="card-tag">Canvas</span>
        </a>

        <a class="card" href="code.html">
            <div class="card-title">💻 code.html</div>
            <div class="card-desc">另一个小页面</div>
            <span class="card-tag">HTML</span>
        </a>

        <a class="card" href="say_notes.html">
            <div class="card-title">📝 say_notes.html</div>
            <div class="card-desc">笔记页面</div>
            <span class="card-tag">HTML</span>
        </a>

        <div class="footer">
            GitHub · darken-07
        </div>
    </div>
</body>
</html>
