<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>贪吃蛇小游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }
  .game-wrapper {
    background: #16213e;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    text-align: center;
  }
  h1 {
    color: #e94560;
    font-size: 28px;
    margin-bottom: 15px;
    letter-spacing: 2px;
  }
  canvas {
    border: 2px solid #0f3460;
    border-radius: 8px;
    background: #0f3460;
    display: block;
    margin: 0 auto;
  }
  .info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
    color: #eee;
    font-size: 18px;
  }
  .score { color: #f5c518; font-weight: bold; font-size: 22px; }
  .game-over {
    color: #e94560;
    font-size: 22px;
    font-weight: bold;
    min-height: 30px;
    margin-top: 10px;
  }
  button {
    background: #e94560;
    color: #fff;
    border: none;
    padding: 10px 30px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: bold;
  }
  button:hover { background: #c73650; transform: scale(1.05); }
  .hint { color: #888; font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>

<div class="game-wrapper">
  <h1>🐍 贪吃蛇</h1>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="info">
    <span>分数: <span class="score" id="score">0</span></span>
    <span>最高分: <span class="score" id="highScore">0</span></span>
  </div>
  <div class="game-over" id="gameOver"></div>
  <button id="restartBtn">重新开始</button>
  <div class="hint">方向键 / WASD 控制 | 空格键暂停</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const gameOverEl = document.getElementById('gameOver');

const GRID_SIZE = 20;
const CELL_SIZE = canvas.width / GRID_SIZE;
const TICK_INTERVAL = 150;

// 游戏状态
let snake = [];
let food = {};
let direction = 'right';
let nextDirection = 'right';
let score = 0;
let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
let gameRunning = false;
let gamePaused = false;
let gameLoop = null;

highScoreEl.textContent = highScore;

// 初始化
function init() {
  snake = [
    {x: 10, y: 10},
    {x: 9, y: 10},
    {x: 8, y: 10},
    {x: 7, y: 10}
  ];
  direction = 'right';
  nextDirection = 'right';
  score = 0;
  gameOverEl.textContent = '';
  scoreEl.textContent = '0';
  spawnFood();
  gameRunning = true;
  gamePaused = false;
  draw();
}

// 生成食物
function spawnFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * GRID_SIZE),
      y: Math.floor(Math.random() * GRID_SIZE)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

// 绘制
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 绘制网格
  ctx.strokeStyle = '#1a3a6b';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID_SIZE; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL_SIZE, 0);
    ctx.lineTo(i * CELL_SIZE, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL_SIZE);
    ctx.lineTo(canvas.width, i * CELL_SIZE);
    ctx.stroke();
  }

  // 绘制蛇
  snake.forEach((seg, i) => {
    const gradient = ctx.createRadialGradient(
      seg.x * CELL_SIZE + CELL_SIZE/2, seg.y * CELL_SIZE + CELL_SIZE/2, 2,
      seg.x * CELL_SIZE + CELL_SIZE/2, seg.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2
    );
    if (i === 0) {
      gradient.addColorStop(0, '#4ecca3');
      gradient.addColorStop(1, '#2d8f6f');
    } else {
      gradient.addColorStop(0, '#36d399');
      gradient.addColorStop(1, '#1a7a5a');
    }
    ctx.fillStyle = gradient;
    ctx.shadowBlur = i === 0 ? 8 : 4;
    ctx.shadowColor = '#4ecca3';
    const pad = i === 0 ? 1 : 2;
    roundRect(ctx, seg.x * CELL_SIZE + pad, seg.y * CELL_SIZE + pad, CELL_SIZE - pad*2, CELL_SIZE - pad*2, 4);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // 绘制食物
  const pulse = 1 + 0.1 * Math.sin(Date.now() / 200);
  const cx = food.x * CELL_SIZE + CELL_SIZE/2;
  const cy = food.y * CELL_SIZE + CELL_SIZE/2;
  const r = (CELL_SIZE/2 - 2) * pulse;

  ctx.shadowBlur = 12;
  ctx.shadowColor = '#e94560';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#e94560';
  ctx.fill();

  // 食物高光
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(cx - r*0.25, cy - r*0.25, r*0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fill();

  // 暂停提示
  if (gamePaused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停', canvas.width/2, canvas.height/2);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// 更新游戏逻辑
function update() {
  if (!gameRunning || gamePaused) return;
  if (gameLoop) cancelAnimationFrame(gameLoop);

  direction = nextDirection;

  // 计算蛇头新位置
  const head = snake[0];
  let newHead = { ...head };
  switch (direction) {
    case 'up':    newHead.y--; break;
    case 'down':  newHead.y++; break;
    case 'left':  newHead.x--; break;
    case 'right': newHead.x++; break;
  }

  // 检查是否吃到食物
  if (newHead.x === food.x && newHead.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    snake.unshift(newHead);
    if (score > highScore) {
      highScore = score;
      highScoreEl.textContent = highScore;
      localStorage.setItem('snakeHighScore', highScore);
    }
    spawnFood();
  } else {
    snake.unshift(newHead);
    snake.pop();
  }

  // 碰撞检测
  const headCollision = snake[0];
  // 撞墙
  if (headCollision.x < 0 || headCollision.x >= GRID_SIZE ||
      headCollision.y < 0 || headCollision.y >= GRID_SIZE) {
    endGame();
    return;
  }
  // 撞自己
  for (let i = 1; i < snake.length; i++) {
    if (snake[i].x === headCollision.x && snake[i].y === headCollision.y) {
      endGame();
      return;
    }
  }

  draw();
  gameLoop = requestAnimationFrame(update);
}

function endGame() {
  gameRunning = false;
  if (gameLoop) cancelAnimationFrame(gameLoop);
  gameOverEl.textContent = '💀 游戏结束！';
  draw();
}

// 键盘控制
document.addEventListener('keydown', (e) => {
  const key = e.key;
  // 暂停（空格）
  if (key === ' ' || key === 'Space') {
    e.preventDefault();
    if (!gameRunning) return;
    gamePaused = !gamePaused;
    if (!gamePaused) {
      gameLoop = requestAnimationFrame(update);
    }
    draw();
    return;
  }

  if (!gameRunning || gamePaused) return;

  const keyMap = {
    'ArrowUp': 'up', 'w': 'up', 'W': 'up',
    'ArrowDown': 'down', 's': 'down', 'S': 'down',
    'ArrowLeft': 'left', 'a': 'left', 'A': 'left',
    'ArrowRight': 'right', 'd': 'right', 'D': 'right'
  };

  const newDir = keyMap[key];
  if (!newDir) return;
  e.preventDefault();

  // 禁止直接掉头
  const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
  if (opposites[newDir] !== direction) {
    nextDirection = newDir;
  }
});

// 重启按钮
document.getElementById('restartBtn').addEventListener('click', () => {
  if (gameLoop) cancelAnimationFrame(gameLoop);
  init();
  gameLoop = requestAnimationFrame(update);
});

// 启动游戏
init();
// 预置一帧动画loop，然后用setInterval驱动
gameLoop = requestAnimationFrame(function tick() {
  update();
  setTimeout(() => { gameLoop = requestAnimationFrame(tick); }, TICK_INTERVAL);
});
</script>
</body>
</html>
